services:
  caddy:
    image: caddy:2.7
    restart: always
    ports:
      - 2000:2000
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
  db:
    image: postgres:15
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 1s
      timeout: 5s
      retries: 30
    environment:
      POSTGRES_USER: planera
      POSTGRES_PASSWORD: planera
      POSTGRES_DB: planera
    volumes:
      - ./data/db:/var/lib/postgresql/data
  planera-api:
    image: ghcr.io/paddim8/planera-api:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    build:
      context: .
      dockerfile: api/Planera.Api/Dockerfile
    environment:
      PLANERA_FRONTENDURL: http://localhost:2000
      PLANERA_EMAILCONFIRMATION: "false"
      PLANERA_DISABLEREGISTRATION: "false"
      # Postgres (required)
      PLANERA_POSTGRES__HOST: "db:5432"
      PLANERA_POSTGRES__USER: planera
      PLANERA_POSTGRES__PASSWORD: planera
      PLANERA_POSTGRES__DB: planera
      # SMTP (optional)
      PLANERA_SMTP__HOST: ""
      PLANERA_SMTP__PORT: ""
      PLANERA_SMTP__USER: ""
      PLANERA_SMTP__PASSWORD: ""
      PLANERA_SMTP__SENDER: ""
      # OIDC (optional)
      PLANERA_OIDC__PROVIDERID: ""
      PLANERA_OIDC__PROVIDERNAME: ""
      PLANERA_OIDC__PROVIDERURL: ""
      PLANERA_OIDC__PROVIDERICONURL: ""
      PLANERA_OIDC__CLIENTID: ""
      PLANERA_OIDC__CLIENTSECRET: ""
      PLANERA_OIDC__SCOPES: "openid profile email"
    volumes:
      - ./data/api:/app/data
  planera-web:
    image: ghcr.io/paddim8/planera-web:latest
    restart: always
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      ORIGIN: http://localhost:2000
      VITE_PUBLIC_API_URL: https://localhost:2000/api
